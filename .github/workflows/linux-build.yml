name: Build Linux Packages

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: linux-build-${{ github.ref }}
  cancel-in-progress: true

env:
  VERSION: "2.0.0"

jobs:
  build:
    # 22.04 = glibc piu' vecchia, il binario gira anche su distro non recentissime
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip --no-cache-dir
        pip install -r requirements.txt --no-cache-dir
        pip install pyinstaller --no-cache-dir

    - name: Build binary
      run: |
        pyinstaller main.py \
          --name Census \
          --windowed \
          --noconfirm \
          --clean \
          --collect-all customtkinter \
          --add-data "icon.png:." \
          --add-data "icon.ico:." \
          --add-data "bg_watermark.png:."

    - name: Portable tar.gz
      run: |
        cd dist
        tar -czf "../Census_${VERSION}_Linux_x86_64.tar.gz" Census

    - name: Build .deb package
      run: |
        PKG="census_${VERSION}_amd64"
        mkdir -p "$PKG/DEBIAN" "$PKG/opt/census" \
                 "$PKG/usr/share/applications" \
                 "$PKG/usr/share/icons/hicolor/512x512/apps"

        cp -r dist/Census/* "$PKG/opt/census/"
        chmod 755 "$PKG/opt/census/Census"
        cp icon_512.png "$PKG/usr/share/icons/hicolor/512x512/apps/census.png"

        printf '%s\n' \
          '[Desktop Entry]' \
          'Type=Application' \
          'Name=Census' \
          'Comment=Gestionale ERP - fatturazione, magazzino, scadenzario' \
          'Exec=/opt/census/Census' \
          'Icon=census' \
          'Terminal=false' \
          'Categories=Office;Finance;' \
          > "$PKG/usr/share/applications/census.desktop"

        printf '%s\n' \
          'Package: census' \
          "Version: ${VERSION}" \
          'Section: office' \
          'Priority: optional' \
          'Architecture: amd64' \
          'Maintainer: Stefan <stefans-code@users.noreply.github.com>' \
          'Description: Census ERP - gestionale fatturazione, magazzino e scadenzario' \
          ' Gestionale con documenti di vendita/acquisto, magazzino con barcode,' \
          ' scadenzario, statistiche e registro IVA.' \
          > "$PKG/DEBIAN/control"

        dpkg-deb --build --root-owner-group "$PKG"
        mv "${PKG}.deb" "Census_${VERSION}_amd64.deb"

    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: Census-Linux-deb
        path: Census_*.deb

    - name: Upload portable tar.gz
      uses: actions/upload-artifact@v4
      with:
        name: Census-Linux-portable
        path: Census_*_Linux_x86_64.tar.gz
